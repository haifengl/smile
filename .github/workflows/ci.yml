name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    name: Test (Java 25)
    runs-on: ubuntu-latest

    steps:
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev libarpack2-dev xvfb

      - name: Install ONNX Runtime and set LD_LIBRARY_PATH
        run: |
          pip install onnxruntime

          # Locate the onnxruntime/capi directory robustly with 'find' rather than
          # parsing 'pip show', which can return a user-local path (~/.local/lib) that
          # differs from the actual installed location, or produce no output at all
          # when pip and python are mismatched on the runner.
          ONNX_CAPI_DIR=$(find /home -type d -name "capi" \
            -path "*/onnxruntime/capi" 2>/dev/null | head -n 1)

          if [ -z "$ONNX_CAPI_DIR" ]; then
            echo "ERROR: could not locate onnxruntime/capi directory" >&2
            exit 1
          fi
          echo "Found ONNX capi at: ${ONNX_CAPI_DIR}"

          # Create a symlink to the latest libonnxruntime.so in the capi directory
          ln -sfr "$(ls -t ${ONNX_CAPI_DIR}/libonnxruntime.so.* | head -n 1)" ${ONNX_CAPI_DIR}/libonnxruntime.so

          # Use the safe ${VAR:+:$VAR} idiom so no trailing colon is introduced when
          # LD_LIBRARY_PATH is unset or empty (an empty segment is interpreted as CWD
          # by glibc and may be silently rejected by the JVM launcher).
          echo "LD_LIBRARY_PATH=${ONNX_CAPI_DIR}${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
          echo "LD_LIBRARY_PATH=${ONNX_CAPI_DIR}${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Run unit tests (skip integration tests)
        run: xvfb-run --auto-servernum ./gradlew test -DexcludeTags=integration --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 14

