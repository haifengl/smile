name: Publish Libraries to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 6.0.1)'
        required: true
        type: string
  release:
    types: [ published ]

jobs:
  publish:
    name: Build and Publish (Java 25)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev libarpack2-dev gnupg

      - name: Install ONNX Runtime and set LD_LIBRARY_PATH
        run: |
          pip install onnxruntime
          PYTHON_VERSION=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          ONNX_CAPI_DIR="/usr/local/lib/python${PYTHON_VERSION}/dist-packages/onnxruntime/capi"
          echo "LD_LIBRARY_PATH=${ONNX_CAPI_DIR}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_KEY_ID }}:6:" | gpg --import-ownertrust

      - name: Publish libraries to Maven Central
        run: ./gradlew publish --no-daemon
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

