name: Publish Libraries to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 6.0.1)'
        required: true
        type: string
  release:
    types: [ published ]

jobs:
  publish:
    name: Build and Publish (Java 25)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev libarpack2-dev gnupg

      - name: Install ONNX Runtime and set LD_LIBRARY_PATH
        run: |
          pip install onnxruntime

          # Locate the onnxruntime/capi directory robustly with 'find' rather than
          # parsing 'pip show', which can return a user-local path (~/.local/lib) that
          # differs from the actual installed location, or produce no output at all
          # when pip and python are mismatched on the runner.
          ONNX_CAPI_DIR=$(find /home -type d -name "capi" \
            -path "*/onnxruntime/capi" 2>/dev/null | head -n 1)

          if [ -z "$ONNX_CAPI_DIR" ]; then
            echo "ERROR: could not locate onnxruntime/capi directory" >&2
            exit 1
          fi
          echo "Found ONNX capi at: ${ONNX_CAPI_DIR}"

          # Use the safe ${VAR:+:$VAR} idiom so no trailing colon is introduced when
          # LD_LIBRARY_PATH is unset or empty (an empty segment is interpreted as CWD
          # by glibc and may be silently rejected by the JVM launcher).
          echo "LD_LIBRARY_PATH=${ONNX_CAPI_DIR}${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_KEY_ID }}:6:" | gpg --import-ownertrust
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish libraries to Maven Central
        run: |
          sbt publishSigned
          sbt ++2.13.18 scala/publishSigned
          sbt ++2.13.18 json/publishSigned
          sbt sonaRelease
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
