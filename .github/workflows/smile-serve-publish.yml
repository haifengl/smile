name: Publish smile-serve container images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version number (e.g., 6.0.1)'
        required: true
        type: string
        default: '6.2.0'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  NAMESPACE: haifengl

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image_name: smile-serve
            tag_suffix: ""
            dockerfile: ./serve/src/main/docker/Dockerfile.jvm
            context: ./serve
          - image_name: smile-serve
            tag_suffix: "-gpu"
            dockerfile: ./serve/src/main/docker/Dockerfile.jvm-gpu
            context: ./serve

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Debug Frontend Installation
        run: |
          cd serve/src/main/webui
          npm ci

      - name: Build app
        run: ./gradlew :serve:build -x test
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            # Apply semantic versioning tags (e.g., 1.2.3, 1.2, 1)
            type=semver,pattern={{version}},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{major}},suffix=${{ matrix.tag_suffix }}
            type=raw,value=${{ github.event.inputs.version }}${{ matrix.tag_suffix }}
            # Apply the 'latest' tag only on the default branch push
            type=raw,value=latest${{ matrix.tag_suffix }},enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
