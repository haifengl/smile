# HTTP server configuration (runtime property)
quarkus.package.output-name=smile-serve
quarkus.rest.path=/api/v1
smile.serve.model=../model
smile.chat.model=../model/Llama3.1-8B-Instruct
smile.chat.tokenizer=../model/Llama3.1-8B-Instruct/tokenizer.model
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.build-dir=dist
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/smile
quarkus.datasource.username=postgres
quarkus.datasource.password=admin
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.active=false

# ---- Dev profile ----
%dev.quarkus.datasource.db-kind=sqlite
%dev.quarkus.datasource.jdbc.url=jdbc:sqlite:./smile_serve.db
%dev.quarkus.hibernate-orm.active=true
%dev.quarkus.http.port=8888
%dev.quarkus.log.level=DEBUG
%dev.smile.chat.device=7

# ---- Test profile ----
%test.smile.serve.model=serve/src/test/resources/model
# Use an in-memory H2 database so tests are hermetic and fast.
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.active=true
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Point at a non-existent path so ChatService starts in unavailable state
# without attempting to load a real GPU model during tests.
%test.smile.chat.model=serve/src/test/resources/no-such-model
%test.smile.chat.tokenizer=serve/src/test/resources/no-such-tokenizer
