WelcomeSeparator======================================================================
AnalystWelcome=¡Bienvenido! Soy Clair, tu asistente de IA para la ciencia de datos.\n\
\n\
/help para ver los comandos disponibles, /init para inicializar tu proyecto\n\
cwd: {0}
AnalystTips=Como agente de ingeniería de ML/IA de vanguardia, puedo ayudarte con:\n\
\n\
🤖 Soluciones automáticas de ML/IA de extremo a extremo según tus requisitos.\n\
🔍 Mejores prácticas y métodos de última generación con búsqueda web.\n\
🏅 Refinamiento dirigido de bloques de código mediante estudio de ablación.\n\
🤝 Solución mejorada usando estrategia iterativa de ensamblado.\n\
📊 Visualización de datos interactiva avanzada.\n\
📂 Procesa datos desde CSV, ARFF, JSON, Avro, Parquet, Iceberg hasta SQL.\n\
🌐 Servidor de inferencia integrado.\n\
\n\
💡 Consejos para empezar:\n\
1. Shift + ENTER para agregar un salto de línea en tu mensaje.\n\
2. Ejecuta /init para crear un archivo SMILE.md con instrucciones para los agentes.\n\
3. Sé tan específico como lo serías con otro científico de datos para obtener el mejor resultado.\n\
4. Las visualizaciones de datos pueden enviarse a los agentes de IA para interpretación y consejos.\n\
5. Crea comandos slash personalizados para prompts o flujos de trabajo reutilizables.\n\
6. Ejecuta comandos de Shell comenzando con un signo de exclamación (!).\n\
7. La IA puede cometer errores. Revisa siempre las respuestas del agente.
