AnalystWelcome=Bienvenue ! Je suis Clair, votre assistante IA pour la science des données.\n\
\n\
/help pour les commandes disponibles, /init pour initialiser votre projet\n\
cwd: {0}
AnalystTips=En tant qu'agent d'ingénierie ML/IA de pointe, je peux vous aider avec :\n\
\n\
🤖 Solutions ML/IA automatiques de bout en bout selon vos besoins.\n\
🔍 Meilleures pratiques et méthodes de pointe avec recherche web.\n\
🏅 Raffinement ciblé de blocs de code par étude d'ablation.\n\
🤝 Solution améliorée via une stratégie d'ensemble itérative.\n\
📊 Visualisation de données interactive avancée.\n\
📂 Traitement de données CSV, ARFF, JSON, Avro, Parquet, Iceberg et SQL.\n\
🌐 Serveur d'inférence intégré.\n\
\n\
💡 Conseils pour démarrer :\n\
1. Shift + ENTRÉE pour ajouter un saut de ligne dans votre message.\n\
2. Exécutez /init pour créer un fichier SMILE.md avec des instructions pour les agents.\n\
3. Soyez aussi précis que vous le seriez avec un autre data scientist pour de meilleurs résultats.\n\
4. Les visualisations de données peuvent être transmises aux agents IA pour interprétation et conseils.\n\
5. Créez des commandes slash personnalisées pour des prompts ou workflows réutilisables.\n\
6. Exécutez des commandes Shell en commençant par un point d'exclamation (!).\n\
7. L'IA peut faire des erreurs. Vérifiez toujours les réponses des agents.
