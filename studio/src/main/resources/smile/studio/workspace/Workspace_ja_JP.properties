AnalystWelcome=ようこそ！私はClair、データサイエンス担当のAIアシスタントです。\n\
\n\
/help で利用可能なコマンド、/init でプロジェクトの初期化\n\
cwd: {0}
AnalystTips=最先端のML/AIエンジニアリングエージェントとして、以下のことをお手伝いできます：\n\
\n\
🤖 要件に基づいたエンドツーエンドのML/AI自動ソリューション。\n\
🔍 Web検索を活用したベストプラクティスと最新手法の提案。\n\
🏅 アブレーション研究によるコードブロックの精密な改善。\n\
🤝 反復的なアンサンブル戦略を用いた解決策の向上。\n\
📊 高度なインタラクティブデータ可視化。\n\
📂 CSV、ARFF、JSON、Avro、Parquet、Iceberg、SQLからのデータ処理。\n\
🌐 組み込み推論サーバー。\n\
\n\
💡 始めるためのヒント：\n\
1. Shift + ENTER でメッセージに改行を追加。\n\
2. /init を実行してエージェント用のSMILE.mdファイルを作成。\n\
3. 最良の結果を得るために、別のデータサイエンティストに伝えるくらい具体的に指示してください。\n\
4. データ可視化結果をAIエージェントに渡して解釈とアドバイスを受けられます。\n\
5. 再利用可能なプロンプトやワークフロー用にカスタムスラッシュコマンドを作成できます。\n\
6. エクスクラメーションマーク(!)で始めるとシェルコマンドを実行できます。\n\
7. AIは誤りを犯すことがあります。エージェントの応答は必ず確認してください。
