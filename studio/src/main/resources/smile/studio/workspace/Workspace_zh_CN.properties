AnalystWelcome=======================================================================\n\
欢迎！我是 Clair，您的机器学习建模 AI 助手。\n\
\n\
/help 查看可用命令，/init 初始化您的项目\n\
cwd: {0}
AnalystTips=作为顶尖的 ML/AI 工程智能体，我可以帮助您：\n\
\n\
🤖 根据您的需求自动构建端到端的 ML/AI 解决方案。\n\
🔍 结合网络搜索提供最佳实践和前沿方法。\n\
🏅 通过消融研究对代码块进行精准优化。\n\
🤝 利用迭代集成策略改进解决方案。\n\
📊 高级交互式数据可视化。\n\
📂 处理来自 CSV、ARFF、JSON、Avro、Parquet、Iceberg 及 SQL 的数据。\n\
🌐 内置推理服务器。\n\
\n\
💡 使用技巧：\n\
1. Shift + ENTER 在提示中添加换行。\n\
2. 运行 /init 创建包含智能体指令的 SMILE.md 文件。\n\
3. 像与真实数据科学家沟通一样，尽量具体描述需求以获得最佳结果。\n\
4. 数据可视化结果可以发送给 AI 智能体进行解读和建议。\n\
5. 创建自定义斜杠命令以复用常用提示或工作流。\n\
6. 以感叹号(!)开头的内容将作为 Shell 命令执行。\n\
7. AI 可能犯错，请务必审查智能体的回复。
